<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>TBR Board Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1>📚 TBR Board Game 🎲</h1>

  <div id="dice">🎲</div>
  <div id="diceText">Redo att spela</div>

  <button onclick="rollDice()">🎲 Slå tärning</button>
</div>

<div id="boardWrapper">
  <div id="board"></div>
</div>

<div id="overlay" class="hidden"></div>

<div id="popup" class="hidden">
  <h2>✨ Resultat ✨</h2>
  <p id="popupContent"></p>
  <button onclick="closePopup()">Stäng</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
