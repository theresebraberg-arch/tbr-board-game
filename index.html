<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>TBR Board Game 📚</title>

</head>
<body>

<h1>📚 TBR Board Game 🎲</h1>

<!-- 🎲 Dice -->

  <div id="diceText">Klicka för att slå</div>
</div>

<!-- 🟪 Board -->
<div id="board"></div>

<button onclick="rollDice()">🎲 Slå tärning</button>

<div id="popup" class="hidden">
  <div id="popupContent"></div>
  <button onclick="closePopup()">Stäng</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
