<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBR Board Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

  <h1>📚 TBR Board Game 🎲</h1>

  <div id="topArea">
    <div id="diceArea">
      <div id="diceVisual">
        <div class="dice" id="dice1"></div>
        <div class="dice" id="dice2"></div>
      </div>
      <p id="diceText">Redo att spela</p>
      <button onclick="rollDice()">🎲 Slå tärning</button>
      <button onclick="resetGame()">🔄 Börja om</button>
    </div>

    <div id="jarArea">
      <div id="jar" onclick="drawFromJar()">🫙</div>
      <p id="jarText">TBR Jar</p>
    </div>
  </div>

  <div id="board"></div>

 <div id="jarModal" class="hidden">
  <div class="jar-card">
    <h2>📚 Din bok</h2>
    <p id="jarBook" class="hidden"></p>
    <button onclick="closeJar()">Stäng</button>
  </div>
</div>
  <div id="resultModal" class="hidden">
  <div class="result-card">
    <h2>📍 Din ruta</h2>
    <p id="resultText"></p>
    <button onclick="closeResult()">Stäng</button>
  </div>
</div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
